<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Taz — DEAP Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="title-col">
    <span class="title">Group Chat</span>
    <div class="status-row">
      <span class="status-dot"></span>
      <span class="status-text">Taz is online</span>
    </div>
  </div>
  <div class="taz-id">
    <span class="taz-name">Taz</span>
    <div class="avatar">T</div>
  </div>
</header>

<div id="scrollArea">
  <div id="messages"></div>
</div>

<footer>
  <div class="footer-inner">
    <div id="chatBox" class="hidden">
      <div class="composer">
        <input id="msgInput" type="text" placeholder="Message the room — mention @Taz for DEAP help">
        <button id="sendBtn" class="send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="6"></line><polyline points="6 12 12 6 18 12"></polyline></svg>
        </button>
      </div>
      <div class="hint">Signed in as <span id="whoLabel" class="who"></span> · Press Enter to send</div>
    </div>

    <div id="joinBox" class="join-row">
      <span class="join-label">Enter your name to join the room</span>
      <div class="join-inputs">
        <input id="nameInput" type="text" placeholder="Your name">
        <button id="joinBtn" class="join-btn">Join</button>
      </div>
    </div>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
